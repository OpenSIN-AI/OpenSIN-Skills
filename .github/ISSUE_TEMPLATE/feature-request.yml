name: Feature request
description: Propose a new governance, skill-library, or automation improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / opportunity
      description: What gap should be closed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the requested improvement.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Done criteria
      description: List concrete validation or acceptance checks.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Supporting references
      description: Link related docs, repos, screenshots, or issue context.
